<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>José Alejandro Jiménez Rosa | DBA Documentation</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg: #f3f6fa;
      --card: #ffffff;
      --text: #24292f;
      --muted: #6b7280;
      --header: linear-gradient(90deg, #111827, #1f2937, #111827);
      --accent: #22b8ff;
      --shadow: 0 10px 35px rgba(0,0,0,.12);
      --border: #d0d7de;
    }

    body.dark {
      --bg: #0d1117;
      --card: #161b22;
      --text: #e6edf3;
      --muted: #9ca3af;
      --border: #30363d;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    #progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      width: 0%;
      background: var(--accent);
      z-index: 100000;
    }

    header {
      position: fixed;
      top: 4px;
      left: 0;
      right: 0;
      height: 95px;
      display: flex;
      align-items: center;
      padding: 12px 36px;
      background: var(--header);
      color: white;
      z-index: 9999;
      box-shadow: 0 6px 25px rgba(0,0,0,.35);
    }

    .profile-img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 22px;
      border: 3px solid var(--accent);
      box-shadow: 0 0 22px rgba(34,184,255,.45);
      background: #1f2937;
    }

    .profile h1 {
      margin: 0;
      font-size: 31px;
      line-height: 1.1;
      font-weight: 800;
    }

    .profile p {
      margin: 6px 0 8px;
      color: #d1d5db;
      font-size: 15px;
    }

    .links a {
      color: white;
      text-decoration: none;
      margin-right: 18px;
      font-size: 15px;
      opacity: .9;
    }

    .links a:hover { color: var(--accent); }

    .actions {
      margin-left: auto;
      display: flex;
      gap: 12px;
    }

    .actions button {
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.08);
      color: white;
      padding: 9px 13px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }

    .actions button:hover {
      background: rgba(255,255,255,.18);
    }

    .layout {
      max-width: 1500px;
      margin: 0 auto;
      padding: 135px 30px 50px;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 34px;
    }

    .markdown-body {
      background: var(--card);
      color: var(--text);
      padding: 55px;
      border-radius: 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      min-height: 80vh;
    }

    .markdown-body h1,
    .markdown-body h2 {
      border-bottom: 2px solid var(--border);
      padding-bottom: 12px;
      margin-top: 38px;
    }

    .markdown-body h1:first-child {
      margin-top: 0;
    }

    .markdown-body pre {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }

    .copy-btn {
      position: absolute;
      right: 10px;
      top: 10px;
      border: 0;
      background: #30363d;
      color: white;
      padding: 6px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
    }

    aside {
      position: sticky;
      top: 125px;
      height: calc(100vh - 150px);
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 16px;
      padding: 22px;
      overflow-y: auto;
    }

    aside h3 {
      margin-top: 0;
      font-size: 17px;
    }

    #toc a {
      display: block;
      text-decoration: none;
      color: #0969da;
      padding: 7px 8px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.25;
    }

    #toc a:hover,
    #toc a.active {
      background: rgba(34,184,255,.12);
      color: #0284c7;
      font-weight: 700;
    }

    #search {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
      background: transparent;
      color: var(--text);
    }

    footer {
      text-align: center;
      margin-top: 45px;
      color: var(--muted);
      font-size: 14px;
      border-top: 1px solid var(--border);
      padding-top: 25px;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      aside {
        display: none;
      }
    }

    @media (max-width: 700px) {
      header {
        height: auto;
        padding: 14px 18px;
      }

      .profile-img {
        width: 58px;
        height: 58px;
      }

      .profile h1 {
        font-size: 22px;
      }

      .profile p {
        font-size: 13px;
      }

      .actions {
        display: none;
      }

      .layout {
        padding: 130px 14px 35px;
      }

      .markdown-body {
        padding: 28px;
      }
    }
  </style>
</head>

<body>

  <div id="progress"></div>

  <header>
    <img class="profile-img" src="https://avatars.githubusercontent.com/u/7384546?v=4" alt="José Alejandro Jiménez Rosa">

    <div class="profile">
      <h1>José Alejandro Jiménez Rosa</h1>
      <p>Senior Database Administrator · SQL Server · PostgreSQL · Oracle · MongoDB · Linux · Automation</p>

      <div class="links">
        <a href="https://github.com/ajimenezrosa" target="_blank"><i class="fa-brands fa-github"></i> GitHub</a>
        <a href="https://www.linkedin.com/in/alejandro-jimenez-rosa-25586527/" target="_blank"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
        <a href="mailto:ja.jimenezrosa@gmail.com"><i class="fa-solid fa-envelope"></i> Email</a>
      </div>
    </div>

    <div class="actions">
      <button onclick="toggleTheme()" title="Cambiar tema"><i class="fa-solid fa-moon"></i></button>
      <button onclick="window.print()" title="Imprimir o guardar PDF"><i class="fa-solid fa-print"></i></button>
    </div>
  </header>

  <div class="layout">
    <main>
      <article id="content" class="markdown-body">
        Cargando README.md...
      </article>

      <footer>
        © 2026 José Alejandro Jiménez Rosa · Senior Database Administrator<br>
        SQL Server · PostgreSQL · Oracle · MongoDB · Linux
      </footer>
    </main>

    <aside>
      <h3>Contenido</h3>
      <input id="search" type="text" placeholder="Buscar en el documento..." />
      <nav id="toc"></nav>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>

  <script>
    const content = document.getElementById("content");
    const toc = document.getElementById("toc");
    const search = document.getElementById("search");
    let originalHTML = "";

    marked.setOptions({
      breaks: true,
      gfm: true,
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      }
    });

    fetch("README.md")
      .then(response => {
        if (!response.ok) {
          throw new Error("No se pudo cargar README.md");
        }
        return response.text();
      })
      .then(markdown => {
        content.innerHTML = marked.parse(markdown);
        originalHTML = content.innerHTML;
        hljs.highlightAll();
        createTOC();
        addCopyButtons();
      })
      .catch(error => {
        content.innerHTML = `
          <h1>No se encontró README.md</h1>
          <p>Coloca este archivo <strong>index.html</strong> en la misma carpeta donde está tu <strong>README.md</strong>.</p>
          <pre><code>Proyecto/
├── index.html
├── README.md
└── images/
    └── profile.jpg</code></pre>
        `;
      });

    function createTOC() {
      const headings = content.querySelectorAll("h1, h2, h3");
      let html = "";
      let count = 1;

      headings.forEach(h => {
        const id = h.innerText
          .toLowerCase()
          .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
          .replace(/[^\w\s-]/g, "")
          .replace(/\s+/g, "-");

        h.id = id;

        const indent = h.tagName === "H2" ? "18px" : h.tagName === "H3" ? "34px" : "0";
        html += `<a href="#${id}" style="margin-left:${indent}">${count}. ${h.innerText}</a>`;
        count++;
      });

      toc.innerHTML = html;
    }

    function addCopyButtons() {
      document.querySelectorAll("pre").forEach(pre => {
        const button = document.createElement("button");
        button.className = "copy-btn";
        button.innerText = "Copiar";

        button.onclick = () => {
          const code = pre.querySelector("code").innerText;
          navigator.clipboard.writeText(code);
          button.innerText = "Copiado";
          setTimeout(() => button.innerText = "Copiar", 1500);
        };

        pre.appendChild(button);
      });
    }

    function toggleTheme() {
      document.body.classList.toggle("dark");
      localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
    }

    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark");
    }

    window.addEventListener("scroll", () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = (scrollTop / docHeight) * 100;
      document.getElementById("progress").style.width = progress + "%";

      const headings = [...content.querySelectorAll("h1, h2, h3")];
      const links = [...toc.querySelectorAll("a")];

      let current = "";

      headings.forEach(h => {
        if (window.scrollY >= h.offsetTop - 160) {
          current = h.id;
        }
      });

      links.forEach(a => {
        a.classList.remove("active");
        if (a.getAttribute("href") === "#" + current) {
          a.classList.add("active");
        }
      });
    });

    search.addEventListener("input", () => {
      const term = search.value.trim().toLowerCase();

      if (!term) {
        content.innerHTML = originalHTML;
        hljs.highlightAll();
        createTOC();
        addCopyButtons();
        return;
      }

      const plainText = content.innerText.toLowerCase();

      if (!plainText.includes(term)) {
        content.innerHTML = originalHTML + `<p><strong>No se encontraron resultados para:</strong> ${term}</p>`;
        return;
      }

      content.innerHTML = originalHTML.replace(
        new RegExp(`(${term})`, "gi"),
        `<mark>$1</mark>`
      );

      hljs.highlightAll();
      addCopyButtons();
    });
  </script>

</body>
</html>
